  <div class="bg-glow"></div>

  <nav class="navbar">

    <div class="tool-page-header">

      <div>
        <h1>2D 姿勢編輯器</h1>
        <p>拖曳關節節點調整人體骨架，支援 OpenPose 格式匯出，適用於 ControlNet 與 AI 繪圖參考</p>
      </div>
    </div>

    <!-- ① Presets -->
    <div class="card">
      <div class="card-title">① 預設動作</div>
      <div class="preset-group">
        <span class="preset-group-label">基礎</span>
        <div class="preset-btns">
          <button class="btn btn-ghost preset-btn active" data-preset="stand">🧍 直立</button>
          <button class="btn btn-ghost preset-btn" data-preset="tpose">✈ T字形</button>
          <button class="btn btn-ghost preset-btn" data-preset="walk">🚶 走路</button>
          <button class="btn btn-ghost preset-btn" data-preset="run">🏃 跑步</button>
          <button class="btn btn-ghost preset-btn" data-preset="sit">🪑 坐下</button>
          <button class="btn btn-ghost preset-btn" data-preset="lie">🛌 躺下</button>
          <button class="btn btn-ghost preset-btn" data-preset="kneel">🧎 跪下</button>
        </div>
      </div>
      <div class="preset-group" style="margin-top:0.75rem;">
        <span class="preset-group-label">動作</span>
        <div class="preset-btns">
          <button class="btn btn-ghost preset-btn" data-preset="raise_hand">🙋 舉手</button>
          <button class="btn btn-ghost preset-btn" data-preset="jump">🤸 跳躍</button>
          <button class="btn btn-ghost preset-btn" data-preset="punch">🥊 打拳</button>
          <button class="btn btn-ghost preset-btn" data-preset="lunge">🏋 弓箭步</button>
          <button class="btn btn-ghost preset-btn" data-preset="hands_hips">🕴 叉腰</button>
          <button class="btn btn-ghost preset-btn" data-preset="bend">🙇 俯身</button>
        </div>
      </div>
    </div>

    <!-- ② Style & Mode -->
    <div class="card">
      <div class="card-title">② 骨架風格 ＆ 操作模式</div>
      <div class="controls-row">
        <div class="control-group">
          <span class="control-label">風格</span>
          <div class="style-btns">
            <button class="style-btn active" data-style="comfyui">ComfyUI 標準</button>
            <button class="style-btn" data-style="openpose">彩色中左右</button>

            <button class="style-btn" data-style="white">白色骨架</button>
            <button class="style-btn" data-style="neon">霓虹</button>
          </div>
        </div>
      </div>

      </div>
    </div>

    <!-- ③ Canvas -->
    <div class="card">
      <div class="canvas-top-bar">
        <div class="ratio-group">

              <button class="ratio-btn" data-w="768" data-h="512">768×512<span class="size-tag">SD1.5→</span></button>

            <input type="number" id="custom-h" value="768" min="100" max="2048" />
            <button class="btn btn-ghost btn-sm" id="apply-custom-btn">套用</button>
          </div>
        </div>
        <div class="canvas-actions">

    ['head', 'l_eye'], ['l_eye', 'l_ear'],

  function boneColor(fromId, toId) {
    const fs = JOINT_MAP[fromId].side, ts = JOINT_MAP[toId].side;
    if (fs === ts) return SIDE_COLOR[fs];
    return fs === 'center' ? SIDE_COLOR[ts] : SIDE_COLOR[fs];
  }

      l_ankle:[195,565],    r_ankle:[260,565],
    },
  };

  // =====================================================================
  // STATE
  // =====================================================================
  let canvasW = 450, canvasH = 600;
  let joints       = {};
  let selectedJoint = null;
  let isDragging   = false;
  let dragStartX   = 0, dragStartY = 0;
  let moveAllMode  = false;
  let rotateMode    = '';     // '' | 'z' | 'y' | 'x'
  let rotStartAngle = 0;
  let rotSnapStartX = 0, rotSnapStartY = 0;
  let rotCX = 0, rotCY = 0;
  let rotSnapshot   = {};   // joints snapshot at rotate-start
  let bgImage      = null;
  let bgFit        = 'contain';
  let bgOffsetX    = 0, bgOffsetY = 0;
  let currentPreset = 'stand';
  let currentStyle  = 'comfyui';

  // =====================================================================
  // CANVAS INIT
  // =====================================================================
  const canvas = document.getElementById('pose-canvas');
  const ctx    = canvas.getContext('2d');

  function initCanvas(w, h) {
    canvasW = w; canvasH = h;
    canvas.width = w; canvas.height = h;
    document.getElementById('canvas-info').textContent = `${w} × ${h}`;
    render();
  }

  function canvasPos(e) {
    const rect  = canvas.getBoundingClientRect();
    const scaleX = canvasW / rect.width, scaleY = canvasH / rect.height;
    const src   = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - rect.left) * scaleX, y: (src.clientY - rect.top) * scaleY };
  }

  // =====================================================================
  // PRESETS
  // =====================================================================
  function applyPreset(name) {
    currentPreset = name;
    for (const [id, [px, py]] of Object.entries(PRESETS[name])) {
      joints[id] = { x: (px / REF_W) * canvasW, y: (py / REF_H) * canvasH };
    }
    initFaceJoints();
    render();
  }

  // Auto-place eye/ear joints relative to head+neck position (W-shape)
  function initFaceJoints() {
    const h = joints['head'], n = joints['neck'];
    if (!h || !n) return;
    const dx = h.x - n.x, dy = h.y - n.y;
    const len = Math.hypot(dx, dy) || 1;
    const ux = dx / len, uy = dy / len;   // up: neck→head unit vector
    const rx = -uy, ry = ux;              // right perpendicular
    const ew = len * 0.30;   // eye lateral offset
    const aw = len * 0.52;   // ear lateral offset (wider)
    const ef = len * 0.05;   // eyes slightly forward (above nose)
    joints['r_eye'] = { x: h.x + rx*ew + ux*ef, y: h.y + ry*ew + uy*ef };
    joints['l_eye'] = { x: h.x - rx*ew + ux*ef, y: h.y - ry*ew + uy*ef };
    joints['r_ear'] = { x: h.x + rx*aw,          y: h.y + ry*aw          };
    joints['l_ear'] = { x: h.x - rx*aw,          y: h.y - ry*aw          };
  }

  function rescaleJoints(nw, nh) {
    for (const id of Object.keys(joints)) {
      joints[id].x = (joints[id].x / canvasW) * nw;
      joints[id].y = (joints[id].y / canvasH) * nh;
    }
  }

  // =====================================================================
  // DRAWING
  // =====================================================================
  function getStyleCfg() {
    const s = canvasW / 450;
    switch (currentStyle) {
      case 'comfyui':
        return { bg:'#000000', bw:Math.max(3,5*s), bsb:4*s, ba:1,
                 jsb:4*s,  bC:(f,t)=>COMFY_BONE[f+'-'+t]||'#ffffff', jC:id=>COMFY_JOINT[id]||'#ffffff' };
      case 'openpose':
        return { bg:'#0f0f1a', bw:Math.max(3,5*s), bsb:12*s, ba:0.92,
                 jsb:14*s, bC:boneColor, jC: id => SIDE_COLOR[JOINT_MAP[id].side] };
      case 'openpose-white':
        return { bg:'#f5f5f0', bw:Math.max(3,5*s), bsb:5*s, ba:0.95,
                 jsb:5*s,  bC:boneColor, jC: id => SIDE_COLOR[JOINT_MAP[id].side] };
      case 'white':
        return { bg:'#111111', bw:Math.max(2,3*s), bsb:0, ba:0.9,
                 jsb:0,    bC:()=>'#e0e0e0', jC:()=>'#e0e0e0' };
      case 'neon':
        return { bg:'#000000', bw:Math.max(4,6*s), bsb:28*s, ba:1,
                 jsb:22*s, bC:boneColor, jC: id => SIDE_COLOR[JOINT_MAP[id].side] };
      default:
        return getStyleCfg();
    }
  }

  function drawBackground(c, w, h) {
    const cfg = getStyleCfg();
    c.fillStyle = cfg.bg;
    c.fillRect(0, 0, w, h);
    if (!bgImage) return;

    const iw = bgImage.naturalWidth, ih = bgImage.naturalHeight;
    const cAR = w / h, iAR = iw / ih;
    let dw, dh;
    if (bgFit === 'contain') {
      if (iAR > cAR) { dw = w; dh = w / iAR; }
      else           { dh = h; dw = h * iAR; }
    } else {
      if (iAR > cAR) { dh = h; dw = h * iAR; }
      else           { dw = w; dh = w / iAR; }
    }
    c.drawImage(bgImage, (w - dw) / 2 + bgOffsetX, (h - dh) / 2 + bgOffsetY, dw, dh);
  }

  // Darken a #rrggbb colour by factor f (0–1); used for OpenPose bone rendering
  function hexDarken(hex, f) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
  }

  // Draw a filled-ellipse bone (mirrors cv2.ellipse2Poly + fillConvexPoly in util.draw_bodypose)
  function drawEllipseLimb(c, x1, y1, x2, y2, sw, color) {
    const len = Math.hypot(x2 - x1, y2 - y1);
    if (len < 1) return;
    c.save();
    c.translate((x1 + x2) / 2, (y1 + y2) / 2);
    c.rotate(Math.atan2(y2 - y1, x2 - x1));
    c.beginPath();
    c.ellipse(0, 0, len / 2, sw, 0, 0, Math.PI * 2);
    c.fillStyle = color;
    c.fill();
    c.restore();
  }

  function drawSkeleton(c, w, h, showSel) {
    const cfg = getStyleCfg();
    const s   = w / 450;

    drawBackground(c, w, h);

    // ── ComfyUI ControlNet exact rendering ───────────────────────────────
    // Mirrors util.draw_bodypose() in comfyui_controlnet_aux:
    //   bones  → filled ellipse polygon at 60% colour brightness (stickwidth=4)
    //   joints → flat filled circle at full brightness (radius=4)
    //   no shadow / glow of any kind
    if (currentStyle === 'comfyui') {
      const sw = Math.max(4, 4 * s);   // stickwidth (scaled to canvas)
      const jr = Math.max(4, 4 * s);   // joint radius (scaled to canvas)
      for (const [fId, tId] of BONE_DEFS) {
        const f = joints[fId], t = joints[tId];
        if (!f || !t) continue;
        drawEllipseLimb(c, f.x, f.y, t.x, t.y, sw, hexDarken(cfg.bC(fId, tId), 0.6));
      }
      for (const def of JOINT_DEFS) {
        const j = joints[def.id];
        if (!j) continue;
        const isSel = showSel && def.id === selectedJoint;
        c.beginPath();
        c.arc(j.x, j.y, isSel ? jr * 1.6 : jr, 0, Math.PI * 2);
        c.fillStyle = cfg.jC(def.id);
        c.fill();
      }
      return;
    }

    c.lineCap = 'round'; c.lineJoin = 'round';

    // — Bones —
    for (const [fId, tId] of BONE_DEFS) {
      const f = joints[fId], t = joints[tId];
      if (!f || !t) continue;
      const color = cfg.bC(fId, tId);
      c.save();
      c.shadowBlur = cfg.bsb; c.shadowColor = color;
      c.strokeStyle = color; c.lineWidth = cfg.bw; c.globalAlpha = cfg.ba;
      c.beginPath(); c.moveTo(f.x, f.y); c.lineTo(t.x, t.y); c.stroke();
      c.restore();
    }

    // — Joints —
    for (const def of JOINT_DEFS) {
      const j = joints[def.id];
      if (!j) continue;
      const color  = cfg.jC(def.id);
      const isSel  = showSel && def.id === selectedJoint;
      const baseR  = def.r * s;
      const r      = isSel ? baseR * 1.5 : baseR;

      c.save();
      c.shadowBlur  = isSel ? cfg.jsb * 1.5 : cfg.jsb;
      c.shadowColor = color;

      if (def.id === 'head') {
        c.strokeStyle = color;
        c.lineWidth   = (isSel ? 3.5 : 2.5) * s;
        c.globalAlpha = 1;
        c.beginPath(); c.arc(j.x, j.y, r, 0, Math.PI * 2); c.stroke();
        c.globalAlpha = currentStyle === 'neon' ? 0.28 : 0.12;
        c.fillStyle   = color;
        c.beginPath(); c.arc(j.x, j.y, r, 0, Math.PI * 2); c.fill();
      } else {
        c.fillStyle   = color;
        c.globalAlpha = 1;
        c.beginPath(); c.arc(j.x, j.y, r, 0, Math.PI * 2); c.fill();
        if (currentStyle !== 'white') {
          c.globalAlpha = 0.55;
          c.fillStyle   = '#ffffff';
          c.beginPath(); c.arc(j.x, j.y, r * 0.38, 0, Math.PI * 2); c.fill();
        }
      }
      c.restore();
    }
  }

  function render() { drawSkeleton(ctx, canvasW, canvasH, true); }

  // =====================================================================
  // HIT DETECTION
  // =====================================================================
  function findNearest(x, y) {
    let best = null, bd = Infinity;
    const hitR = Math.max(22, canvasW * 0.055);
    for (const def of JOINT_DEFS) {
      const j = joints[def.id];
      if (!j) continue;
      const d = Math.hypot(j.x - x, j.y - y);
      if (d < hitR && d < bd) { best = def.id; bd = d; }
    }
    return best;
  }

  // =====================================================================
  // ROTATION HELPERS
  // =====================================================================
  function jointsCentroid() {
    const ids = Object.keys(joints);
    if (!ids.length) return { x: canvasW/2, y: canvasH/2 };
    return {
      x: ids.reduce((s, id) => s + joints[id].x, 0) / ids.length,
      y: ids.reduce((s, id) => s + joints[id].y, 0) / ids.length,
    };
  }

  // Apply 3-axis rotation from snapshot
  //   z  = 2D roll (in-plane rotation around centroid)
  //   y  = yaw / turn left-right  (X-coords scaled by cosθ)
  //   x  = pitch / tilt fwd-back  (Y-coords scaled by cosθ)
  function applyRotation(mode, cx, cy, angle) {
    const cos = Math.cos(angle), sin = Math.sin(angle);
    for (const id of Object.keys(rotSnapshot)) {
      const dx = rotSnapshot[id].x - cx, dy = rotSnapshot[id].y - cy;
      if (mode === 'z') {
        joints[id] = { x: cx + dx*cos - dy*sin, y: cy + dx*sin + dy*cos };
      } else if (mode === 'y') {
        // yaw: X collapses toward centre (simulate turning)
        joints[id] = { x: cx + dx * cos, y: rotSnapshot[id].y };
      } else if (mode === 'x') {
        // pitch: Y collapses toward centre (simulate tilting)
        joints[id] = { x: rotSnapshot[id].x, y: cy + dy * cos };
      }
    }
  }

  // =====================================================================
  // POINTER / TOUCH
  // =====================================================================
  function onPointerDown(e) {
    e.preventDefault();
    const p = canvasPos(e);
    dragStartX = p.x; dragStartY = p.y;
    if (rotateMode) {
      isDragging = true;
      const c = jointsCentroid();
      rotCX = c.x; rotCY = c.y;
      rotSnapStartX = p.x; rotSnapStartY = p.y;
      if (rotateMode === 'z') rotStartAngle = Math.atan2(p.y - rotCY, p.x - rotCX);
      rotSnapshot = {};
      for (const id of Object.keys(joints)) rotSnapshot[id] = { x: joints[id].x, y: joints[id].y };
    } else if (moveAllMode) {
      isDragging = true;
    } else {
      const hit = findNearest(p.x, p.y);
      if (hit) { selectedJoint = hit; isDragging = true; }
    }
    render();
  }

  function applyDrag(p) {
    if (!isDragging) return;
    if (rotateMode) {
      let angle;
      if (rotateMode === 'z') {
        angle = Math.atan2(p.y - rotCY, p.x - rotCX) - rotStartAngle;
      } else if (rotateMode === 'y') {
        // horizontal drag → yaw angle (±π across full canvas width)
        angle = (p.x - rotSnapStartX) / (canvasW * 0.55) * Math.PI;
      } else {
        // x-axis: vertical drag → pitch angle
        angle = (p.y - rotSnapStartY) / (canvasH * 0.55) * Math.PI;
      }
      applyRotation(rotateMode, rotCX, rotCY, angle);
    } else if (moveAllMode) {
      const dx = p.x - dragStartX, dy = p.y - dragStartY;
      for (const id of Object.keys(joints)) { joints[id].x += dx; joints[id].y += dy; }
      dragStartX = p.x; dragStartY = p.y;
    } else if (selectedJoint) {
      joints[selectedJoint].x = p.x; joints[selectedJoint].y = p.y;
    }
    render();
  }

  function onMouseMove(e) {
    if (isDragging)             canvas.style.cursor = 'grabbing';
    else if (rotateMode === 'z') canvas.style.cursor = 'grab';
    else if (rotateMode === 'y') canvas.style.cursor = 'ew-resize';
    else if (rotateMode === 'x') canvas.style.cursor = 'ns-resize';
    else if (moveAllMode)       canvas.style.cursor = 'grab';
    else {
      const p = canvasPos(e);
      canvas.style.cursor = findNearest(p.x, p.y) ? 'grab' : 'crosshair';
    }
    if (!isDragging) return;
    e.preventDefault();
    applyDrag(canvasPos(e));
  }

  function onTouchMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    applyDrag(canvasPos(e));
  }

  function onPointerUp() {
    isDragging = false; selectedJoint = null;
    if      (rotateMode === 'y') canvas.style.cursor = 'ew-resize';
    else if (rotateMode === 'x') canvas.style.cursor = 'ns-resize';
    else if (rotateMode || moveAllMode) canvas.style.cursor = 'grab';
    else    canvas.style.cursor = 'crosshair';
    render();
  }

  canvas.addEventListener('mousedown',  onPointerDown);
  canvas.addEventListener('mousemove',  onMouseMove);
  canvas.addEventListener('mouseup',    onPointerUp);
  canvas.addEventListener('mouseleave', onPointerUp);
  canvas.addEventListener('touchstart', onPointerDown, { passive: false });
  canvas.addEventListener('touchmove',  onTouchMove,   { passive: false });
  canvas.addEventListener('touchend',   onPointerUp);

  // =====================================================================
  // UI — PRESETS
  // =====================================================================
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyPreset(btn.dataset.preset);
    });
  });

  // =====================================================================
  // UI — STYLES
  // =====================================================================
  document.querySelectorAll('.style-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentStyle = btn.dataset.style;
      render();
    });
  });

  // =====================================================================
  // UI — MODE
  // =====================================================================
  const moveAllBtn = document.getElementById('move-all-btn');
  moveAllBtn.addEventListener('click', () => {
    moveAllMode = !moveAllMode;
    if (moveAllMode) rotateMode = '';
    moveAllBtn.classList.toggle('active', moveAllMode);
    moveAllBtn.textContent = moveAllMode ? '✓ 整體移動（開啟）' : '↔ 整體移動';
    document.querySelectorAll('.rot-btn').forEach(b => b.classList.remove('active'));
    canvas.style.cursor = moveAllMode ? 'grab' : 'crosshair';
  });

  // Three rotation axes: Z = roll, Y = yaw (turn left/right), X = pitch (tilt fwd/back)
  document.querySelectorAll('.rot-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const axis = btn.dataset.axis;
      rotateMode = (rotateMode === axis) ? '' : axis;
      if (rotateMode) { moveAllMode = false; moveAllBtn.classList.remove('active'); moveAllBtn.textContent = '↔ 整體移動'; }
      document.querySelectorAll('.rot-btn').forEach(b => b.classList.toggle('active', b.dataset.axis === rotateMode));
      if      (rotateMode === 'y') canvas.style.cursor = 'ew-resize';
      else if (rotateMode === 'x') canvas.style.cursor = 'ns-resize';
      else if (rotateMode)         canvas.style.cursor = 'grab';
      else                         canvas.style.cursor = 'crosshair';
    });
  });


  document.getElementById('reset-btn').addEventListener('click', () => applyPreset(currentPreset));

  // =====================================================================
  // UI — RATIO
  // =====================================================================
  document.querySelectorAll('.ratio-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const r = btn.dataset.ratio;
      const bw = btn.dataset.w, bh = btn.dataset.h;
      document.getElementById('custom-size-inputs').style.display = r === 'custom' ? 'flex' : 'none';
      if (bw && bh) {
        // Exact ComfyUI pixel size
        const nw = parseInt(bw), nh = parseInt(bh);
        rescaleJoints(nw, nh); initCanvas(nw, nh);
      } else if (r && r !== 'custom') {
        const [nw, nh] = RATIO_SIZES[r];
        rescaleJoints(nw, nh); initCanvas(nw, nh);
      }
    });
  });

  document.getElementById('apply-custom-btn').addEventListener('click', () => {
    const nw = Math.max(64, Math.min(2048, parseInt(document.getElementById('custom-w').value) || 512));
    const nh = Math.max(64, Math.min(2048, parseInt(document.getElementById('custom-h').value) || 768));
    rescaleJoints(nw, nh); initCanvas(nw, nh);
  });

  // =====================================================================
  // UI — BACKGROUND
  // =====================================================================
  document.getElementById('bg-upload').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const img = new Image();
    img.onload = () => {
      bgImage = img; bgOffsetX = 0; bgOffsetY = 0;
      document.getElementById('bg-controls').style.display = 'flex';
      render();
    };
    img.src = URL.createObjectURL(file);
  });

  document.getElementById('clear-bg-btn').addEventListener('click', () => {
    bgImage = null; bgOffsetX = 0; bgOffsetY = 0;
    document.getElementById('bg-controls').style.display = 'none';
    document.getElementById('bg-upload').value = '';
    render();
  });

  document.getElementById('bg-fit-btn').addEventListener('click',  () => { bgFit = 'contain'; render(); });
  document.getElementById('bg-fill-btn').addEventListener('click', () => { bgFit = 'cover';   render(); });

  const PAN = 20;
  document.getElementById('pan-up').addEventListener('click',     () => { bgOffsetY -= PAN; render(); });
  document.getElementById('pan-down').addEventListener('click',   () => { bgOffsetY += PAN; render(); });
  document.getElementById('pan-left').addEventListener('click',   () => { bgOffsetX -= PAN; render(); });
  document.getElementById('pan-right').addEventListener('click',  () => { bgOffsetX += PAN; render(); });
  document.getElementById('pan-center').addEventListener('click', () => { bgOffsetX = 0; bgOffsetY = 0; render(); });

  // =====================================================================
  // EXPORT — PNG 原尺寸 (1×, ComfyUI 直接使用)
  // =====================================================================
  document.getElementById('export-png1x-btn').addEventListener('click', () => {
    const off = document.createElement('canvas');
    off.width = canvasW; off.height = canvasH;
    const oc = off.getContext('2d');
    drawSkeleton(oc, canvasW, canvasH, false);
    dl(off.toDataURL('image/png'), `pose_${canvasW}x${canvasH}.png`);
  });

  // =====================================================================
  // EXPORT — PNG 2× (高畫質)
  // =====================================================================
  document.getElementById('export-png-btn').addEventListener('click', () => {
    const scale = 2;
    const off = document.createElement('canvas');
    off.width = canvasW * scale; off.height = canvasH * scale;
    const oc = off.getContext('2d');
    oc.scale(scale, scale);
    drawSkeleton(oc, canvasW, canvasH, false);
    dl(off.toDataURL('image/png'), `pose_${canvasW}x${canvasH}_2x.png`);
  });

  // =====================================================================
  // EXPORT — ComfyUI JSON  (comfyui-controlnet-aux PoseKeypoint format)
  // Keypoints are normalized [0,1] so ComfyUI can scale to any resolution
  // =====================================================================
  document.getElementById('export-comfy-btn').addEventListener('click', () => {
    const people = [];
    const kpts = OPENPOSE_KP.map(kp => {
      const j = joints[kp.joint];
      if (j) {
        return {
          x: +((j.x + kp.ox) / canvasW).toFixed(6),
          y: +((j.y + kp.oy) / canvasH).toFixed(6),
          score: 1.0,
        };
      }
      return { x: 0, y: 0, score: 0 };
    });
    const payload = {
      canvas_height: canvasH,
      canvas_width:  canvasW,
      people: [{
        pose_keypoints:       kpts,
        face_keypoints:       [],
        hand_left_keypoints:  [],
        hand_right_keypoints: [],
      }],
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    dl(URL.createObjectURL(blob), `pose_comfyui_${canvasW}x${canvasH}.json`);
  });

  // =====================================================================
  // EXPORT — OpenPose JSON
  // =====================================================================
  document.getElementById('export-json-btn').addEventListener('click', () => {
    const kpts = [];
    for (const kp of OPENPOSE_KP) {
      const j = joints[kp.joint];
      if (j) {
        kpts.push(+((j.x + kp.ox).toFixed(2)), +((j.y + kp.oy).toFixed(2)), 1.0);
      } else {
        kpts.push(0, 0, 0);
      }
    }
    const payload = {
      version: '1.3',
      canvas_width:  canvasW,
      canvas_height: canvasH,
      people: [{
        person_id:               [-1],
        pose_keypoints_2d:        kpts,
        face_keypoints_2d:        [],
        hand_left_keypoints_2d:   [],
        hand_right_keypoints_2d:  [],
        pose_keypoints_3d:        [],
        face_keypoints_3d:        [],
        hand_left_keypoints_3d:   [],
        hand_right_keypoints_3d:  [],
      }],
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    dl(URL.createObjectURL(blob), 'pose_openpose.json');
  });

  // =====================================================================
  // EXPORT — TXT
  // =====================================================================
  document.getElementById('export-txt-btn').addEventListener('click', () => {
    const lines = [
      '# 2D Pose Editor — OpenPose Keypoints',
      `# Canvas: ${canvasW} x ${canvasH}`,
      '# Index,Name,X,Y,Confidence',
      '',
    ];
    OPENPOSE_KP.forEach((kp, i) => {
      const j = joints[kp.joint];
      const x = j ? (j.x + kp.ox).toFixed(2) : '0.00';
      const y = j ? (j.y + kp.oy).toFixed(2) : '0.00';
      const c = j ? '1.00' : '0.00';
      lines.push(`${i},${kp.name},${x},${y},${c}`);
    });
    const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
    dl(URL.createObjectURL(blob), 'pose_openpose.txt');
  });

  function dl(href, filename) {
    const a = document.createElement('a');
    a.href = href; a.download = filename; a.click();
  }

  // =====================================================================
  // INIT  — default: 512×768 (SD1.5 portrait, most common ComfyUI size)
  // =====================================================================
  initCanvas(512, 768);
  applyPreset('stand');
  </script>
</body>
</html>
