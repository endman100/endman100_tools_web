<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok 影片封面下載器 — Endman100 Tools</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <div class="bg-glow"></div>
  <div class="copy-toast" id="copy-toast">已複製！</div>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../../index.html" class="navbar-brand">
        <span class="brand-icon">🛠</span>
        Endman100 Tools
      </a>
      <div class="navbar-links">
        <a href="../../index.html">首頁</a>
        <a href="./" class="active">TikTok 封面</a>
      </div>
    </div>
  </nav>

  <main class="tool-page">
    <a href="../../index.html" class="back-link">← 返回工具列表</a>

    <div class="tool-page-header">
      <div class="icon">🎵</div>
      <div>
        <h1>TikTok 影片封面下載器</h1>
        <p>輸入 TikTok 影片網址，擷取封面縮圖後自行點擊下載。</p>
      </div>
    </div>

    <div class="card">
      <div class="card-title">① 輸入 TikTok 影片網址</div>
      <div class="input-row">
        <input type="text" id="url-input" class="url-input"
          placeholder="https://www.tiktok.com/@user/video/1234567890"
          autocomplete="off" spellcheck="false" />
        <button class="btn btn-primary" id="btn-fetch">擷取封面</button>
      </div>
      <div id="error-msg" class="error-msg hidden"></div>
      <div class="note-msg">支援：www.tiktok.com/@user/video/ID 或 vm.tiktok.com 短網址</div>
    </div>

    <div class="card hidden" id="result-card">
      <div class="card-title">② 封面預覽與下載</div>
      <div class="result-box">
        <div class="thumb-preview">
          <img id="cover-img" src="" alt="封面" />
          <div class="thumb-preview-info">
            <div class="info-title" id="cover-title">—</div>
            <div class="info-sub" id="cover-author">—</div>
            <div class="info-btns">
              <button class="btn btn-ghost" id="btn-copy-url">複製圖片網址</button>
              <a class="btn btn-success" id="btn-download" href="#" target="_blank" rel="noopener">⬇ 點擊下載封面</a>
            </div>
          </div>
        </div>
      </div>

      <div class="info-banner" style="margin-top:1.25rem">
        <span class="bi">💡</span>
        <p>點擊「點擊下載封面」按鈕，即可在新視窗開啟封面圖片，右鍵另存新檔即可下載。若圖片無法顯示（部分私人影片），請在 TikTok App 中截圖取得。</p>
      </div>
    </div>
  </main>

  <script>
    const urlInput   = document.getElementById('url-input');
    const btnFetch   = document.getElementById('btn-fetch');
    const errorMsg   = document.getElementById('error-msg');
    const resultCard = document.getElementById('result-card');
    const coverImg   = document.getElementById('cover-img');
    const coverTitle = document.getElementById('cover-title');
    const coverAuthor= document.getElementById('cover-author');
    const btnCopy    = document.getElementById('btn-copy-url');
    const btnDl      = document.getElementById('btn-download');
    const toast      = document.getElementById('copy-toast');
    let toastTimer;

    function showToast(msg) {
      toast.textContent = msg; toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    async function doFetch() {
      const raw = urlInput.value.trim();
      if (!raw) return;
      errorMsg.classList.add('hidden');
      resultCard.classList.add('hidden');
      btnFetch.disabled = true; btnFetch.textContent = '擷取中…';

      try {
        const oUrl = `https://www.tiktok.com/oembed?url=${encodeURIComponent(raw)}`;
        const res = await fetch(oUrl);
        if (!res.ok) throw new Error(`平台回應錯誤 (HTTP ${res.status})`);
        const data = await res.json();
        if (!data.thumbnail_url) throw new Error('找不到封面圖片');

        coverImg.src = data.thumbnail_url;
        coverTitle.textContent = data.title || '（無標題）';
        coverAuthor.textContent = `作者：${data.author_name || '—'}`;
        btnCopy.onclick = () => navigator.clipboard.writeText(data.thumbnail_url).then(() => showToast('已複製！'));
        btnDl.href = data.thumbnail_url;
        resultCard.classList.remove('hidden');
      } catch (err) {
        errorMsg.classList.remove('hidden');
        errorMsg.textContent = `⚠️ 無法擷取封面：${err.message}。TikTok 可能因 CORS 限制拒絕了此請求，請確認網址正確，或嘗試使用完整網址（非短網址）。`;
      } finally {
        btnFetch.disabled = false; btnFetch.textContent = '擷取封面';
      }
    }

    btnFetch.addEventListener('click', doFetch);
    urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') doFetch(); });
    urlInput.addEventListener('paste', () => setTimeout(doFetch, 50));
  </script>
</body>
</html>
